<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="calculator-container glass">
        <div class="display">
            <div id="equation" class="equation-display"></div>
            <input type="text" id="screen" disabled value="0">
        </div>
        <div class="keypad">
            <button onclick="clearScreen()" class="operator clear">AC</button>
            <button onclick="deleteLast()" class="operator">DEL</button>
            <button onclick="appendValue('π')" class="sci">π</button>
            <button onclick="appendValue('²')" class="sci">x²</button>

            <button onclick="appendValue('sin(')" class="sci">sin</button>
            <button onclick="appendValue('cos(')" class="sci">cos</button>
            <button onclick="appendValue('tan(')" class="sci">tan</button>
            <button onclick="appendValue('log(')" class="sci">log</button>

            <button onclick="appendValue('√(')" class="sci">√</button>
            <button onclick="appendValue('(')" class="sci">(</button>
            <button onclick="appendValue(')')" class="sci">)</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('×')" class="operator">×</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('÷')" class="operator">÷</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
